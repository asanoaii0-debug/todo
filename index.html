<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #2d2d2d;
      --text-muted: #9e9e9e;
      --border: #e8e8e8;
      --accent: #6c63ff;
      --accent-light: rgba(108, 99, 255, 0.08);
      --completed: #b0b0b0;
      --danger: #ef5350;
      --shadow: 0 4px 24px rgba(108, 99, 255, 0.12);
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #12121f;
        --card-bg: #1e1e30;
        --text: #e0e0f0;
        --text-muted: #5a5a7a;
        --border: #2a2a42;
        --accent: #8b82ff;
        --accent-light: rgba(139, 130, 255, 0.1);
        --completed: #4a4a6a;
        --danger: #ff6b6b;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 16px 80px;
    }

    .app { max-width: 580px; margin: 0 auto; }

    h1 {
      text-align: center;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 0.6rem;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 36px;
      text-transform: uppercase;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* Input */
    .input-section {
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
    }

    .toggle-all-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-muted);
      padding: 4px 8px 4px 0;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .toggle-all-btn:hover { color: var(--accent); }
    .toggle-all-btn.all-completed { color: var(--accent); }

    .new-todo {
      flex: 1;
      border: none;
      outline: none;
      padding: 20px 12px;
      font-size: 1.05rem;
      background: transparent;
      color: var(--text);
      font-family: inherit;
    }
    .new-todo::placeholder { color: var(--text-muted); }

    .add-btn {
      background: var(--accent);
      border: none;
      color: white;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
      font-family: inherit;
    }
    .add-btn:hover { opacity: 0.85; }
    .add-btn:active { transform: scale(0.97); }

    /* Todo list */
    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item:hover { background: var(--accent-light); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      margin-right: 14px;
      background: transparent;
    }
    .checkbox:hover { border-color: var(--accent); }
    .todo-item.completed .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }
    .todo-item.completed .checkbox::after {
      content: '✓';
      color: white;
      font-size: 0.7rem;
      font-weight: 800;
    }

    .todo-text {
      flex: 1;
      padding: 18px 4px;
      font-size: 1rem;
      word-break: break-word;
      line-height: 1.45;
      transition: color 0.2s;
      cursor: default;
      user-select: none;
    }
    .todo-item.completed .todo-text {
      color: var(--completed);
      text-decoration: line-through;
      text-decoration-color: var(--completed);
    }

    .edit-input {
      flex: 1;
      border: none;
      outline: 2px solid var(--accent);
      border-radius: 4px;
      background: var(--accent-light);
      color: var(--text);
      font-size: 1rem;
      padding: 6px 8px;
      margin: 12px 4px;
      font-family: inherit;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.2rem;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .todo-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--danger); background: rgba(239, 83, 80, 0.1); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 56px 16px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 2.8rem; margin-bottom: 14px; }
    .empty-state p { font-size: 0.95rem; line-height: 1.6; }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--text-muted);
      gap: 8px;
    }

    .count { min-width: 64px; font-variant-numeric: tabular-nums; }

    .filters { display: flex; gap: 4px; }

    .filter-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.82rem;
      transition: all 0.15s;
      font-family: inherit;
    }
    .filter-btn:hover { color: var(--accent); border-color: var(--accent); }
    .filter-btn.active { color: var(--accent); border-color: var(--accent); font-weight: 600; }

    .clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.82rem;
      transition: color 0.15s;
      min-width: 72px;
      text-align: right;
      font-family: inherit;
      white-space: nowrap;
    }
    .clear-btn:hover { color: var(--danger); }
    .clear-btn:disabled { opacity: 0; pointer-events: none; }

    .hint {
      text-align: center;
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 0.78rem;
      line-height: 2;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>TODO</h1>
    <div class="card">
      <div class="input-section">
        <button class="toggle-all-btn" id="toggleAllBtn" title="すべて完了/未完了">▼</button>
        <input class="new-todo" id="newTodoInput" type="text" placeholder="タスクを入力..." autocomplete="off">
        <button class="add-btn" id="addBtn">追加</button>
      </div>
      <ul class="todo-list" id="todoList"></ul>
      <div class="footer" id="footer" style="display:none">
        <span class="count" id="count"></span>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">すべて</button>
          <button class="filter-btn" data-filter="active">未完了</button>
          <button class="filter-btn" data-filter="completed">完了済み</button>
        </div>
        <button class="clear-btn" id="clearBtn">完了を削除</button>
      </div>
    </div>
    <p class="hint">ダブルクリックで編集 &nbsp;·&nbsp; Enter で確定 &nbsp;·&nbsp; Esc でキャンセル</p>
  </div>

  <script>
    let todos = [];
    let filter = 'all';
    let editingId = null;

    function load() {
      try {
        const data = JSON.parse(localStorage.getItem('todos-v1') || '{}');
        todos  = data.todos  || [];
        filter = data.filter || 'all';
      } catch { todos = []; filter = 'all'; }
    }

    function save() {
      localStorage.setItem('todos-v1', JSON.stringify({ todos, filter }));
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function visible() {
      if (filter === 'active')    return todos.filter(t => !t.completed);
      if (filter === 'completed') return todos.filter(t => t.completed);
      return todos;
    }

    function addTodo(text) {
      text = text.trim();
      if (!text) return;
      todos.unshift({ id: uid(), text, completed: false });
      save(); render();
    }

    function toggleTodo(id) {
      const t = todos.find(t => t.id === id);
      if (t) { t.completed = !t.completed; save(); render(); }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      if (editingId === id) editingId = null;
      save(); render();
    }

    function commitEdit(id, text) {
      text = text.trim();
      if (!text) { deleteTodo(id); return; }
      const t = todos.find(t => t.id === id);
      if (t) t.text = text;
      editingId = null;
      save(); render();
    }

    function toggleAll() {
      const allDone = todos.every(t => t.completed);
      todos.forEach(t => t.completed = !allDone);
      save(); render();
    }

    function clearCompleted() {
      todos = todos.filter(t => !t.completed);
      save(); render();
    }

    function esc(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function render() {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === filter);
      });

      const toggleBtn = document.getElementById('toggleAllBtn');
      const allDone = todos.length > 0 && todos.every(t => t.completed);
      toggleBtn.classList.toggle('all-completed', allDone);
      toggleBtn.style.visibility = todos.length ? 'visible' : 'hidden';

      const activeCount = todos.filter(t => !t.completed).length;
      document.getElementById('count').textContent = `${activeCount} 件残り`;
      document.getElementById('clearBtn').disabled = !todos.some(t => t.completed);
      document.getElementById('footer').style.display = todos.length ? '' : 'none';

      const list = document.getElementById('todoList');
      const items = visible();

      if (!items.length) {
        const msgs = {
          all:       ['📝', 'タスクを追加してください'],
          active:    ['✅', 'すべてのタスクが完了しています！'],
          completed: ['🎉', '完了済みのタスクはありません'],
        };
        const [icon, msg] = msgs[filter];
        list.innerHTML = `<li class="empty-state"><div class="icon">${icon}</div><p>${msg}</p></li>`;
        return;
      }

      list.innerHTML = items.map(todo => `
        <li class="todo-item${todo.completed ? ' completed' : ''}" data-id="${todo.id}">
          <div class="checkbox" data-action="toggle" data-id="${todo.id}"></div>
          ${editingId === todo.id
            ? `<input class="edit-input" id="edit-${todo.id}" type="text" value="${esc(todo.text)}" data-id="${todo.id}">`
            : `<span class="todo-text" data-id="${todo.id}">${esc(todo.text)}</span>`
          }
          <button class="delete-btn" data-action="delete" data-id="${todo.id}" title="削除">✕</button>
        </li>`
      ).join('');

      if (editingId) {
        const inp = document.getElementById(`edit-${editingId}`);
        if (inp) {
          inp.focus();
          inp.setSelectionRange(inp.value.length, inp.value.length);
          const id = editingId;
          inp.addEventListener('blur',    () => { if (editingId === id) commitEdit(id, inp.value); });
          inp.addEventListener('keydown', e => {
            if (e.key === 'Enter')  { e.preventDefault(); commitEdit(id, inp.value); }
            if (e.key === 'Escape') { editingId = null; render(); }
          });
        }
      }
    }

    // clicks (delegation)
    document.getElementById('todoList').addEventListener('click', e => {
      const el = e.target.closest('[data-id]');
      if (!el) return;
      const id = el.dataset.id;
      if (el.dataset.action === 'toggle') toggleTodo(id);
      if (el.dataset.action === 'delete') deleteTodo(id);
    });

    // double-click to edit
    document.getElementById('todoList').addEventListener('dblclick', e => {
      const span = e.target.closest('.todo-text');
      if (span) { editingId = span.dataset.id; render(); }
    });

    // new todo
    function tryAdd() {
      const inp = document.getElementById('newTodoInput');
      addTodo(inp.value);
      inp.value = '';
    }
    document.getElementById('newTodoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryAdd();
    });
    document.getElementById('addBtn').addEventListener('click', tryAdd);

    // controls
    document.getElementById('toggleAllBtn').addEventListener('click', toggleAll);
    document.getElementById('clearBtn').addEventListener('click', clearCompleted);
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { filter = btn.dataset.filter; save(); render(); });
    });

    load();
    render();
  </script>
</body>
</html>
